<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medio Pixel | Fotografía e Impresiones</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="split.css">
    <link rel="icon" type="image/png" href="img/logo-medio-pixel.png">
</head>

<body class="split-page">

    <div class="split-screen">

        <!-- ── LADO FOTOGRAFÍA ── -->
        <a class="split-side split-foto" href="fotografia.html">

            <!--
                FOTO DE PORTAFOLIO:
                Reemplazá el src con tu foto. Recomendado: foto horizontal,
                mínimo 1200px de ancho. Podés usar una URL de Cloudinary.
                Ejemplo: src="https://res.cloudinary.com/TU_CUENTA/image/upload/v.../foto.jpg"
            -->
            <div class="split-bg split-bg-foto">
                <!-- placeholder hasta que agregues la foto -->
                <div class="split-bg-placeholder"></div>
            </div>

            <div class="split-overlay split-overlay-foto"></div>

            <div class="split-content">
                <p class="split-eyebrow">Eric Fortino</p>
                <h2 class="split-title split-title-foto">Fotografía</h2>
                <p class="split-desc">Conciertos · Casamientos · Eventos</p>
                <span class="split-cta split-cta-foto">Ver portafolio →</span>
            </div>

        </a>

        <!-- ── DIVIDER ── -->
        <div class="split-divider">
            <span class="split-brand">MEDIO<br>PIXEL</span>
        </div>

        <!-- ── LADO IMPRESIONES ── -->
        <a class="split-side split-impresiones" href="impresiones.html">

            <div class="split-bg split-bg-impresiones">
                <img src="img/combo9.jpg" alt="Impresiones">
            </div>

            <div class="split-overlay split-overlay-impresiones"></div>

            <div class="split-content">
                <p class="split-eyebrow">Productos personalizados</p>
                <h2 class="split-title split-title-impresiones">Impresiones</h2>
                <p class="split-desc">Polaroids · Packs · Souvenirs</p>
                <span class="split-cta split-cta-impresiones">Ver catálogo →</span>
            </div>

        </a>

    </div>

</body>
</html>
